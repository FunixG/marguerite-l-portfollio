<div class="card">
    <h5 class="card-header">Paragraphe</h5>
    <div class="card-body">
        <div class="row align-items-center text-center">
            <div class="col">
                <app-input-paragraph-text
                        [text]="text"
                        [placeholder]="'Texte à afficher...'"
                        (textChange)="setText($event)"
                ></app-input-paragraph-text>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col d-flex justify-content-end">
                <app-button
                        [label]="'-'"
                        [tooltip]="'Supprimer le module'"
                        [classBtn]="'btn-danger'"
                        (onClick)="removeModule()"
                ></app-button>
            </div>
        </div>
    </div>
</div>
