@if (projectsService.loadedProject) {
    <h2>Image de couverture</h2>
    <div class="text-center">
        @if (projectsService.loadedProject.coverMediaId.length > 0 && media) {
            <div>
                <img [src]="mediasService.getMediaUrl(media)" class="card-img-top" alt="{{ media.mediaDescription }}">
            </div>
        } @else {
            <div>
                <app-image-preview></app-image-preview>
            </div>
        }

        <div>
            <app-button
                    [label]="projectsService.loadedProject.coverMediaId.length > 0 ? 'Modifier' : 'Ajouter'"
                    (onClick)="openMediaSelector()"
            ></app-button>
        </div>
    </div>
}
