<div class="modal-wrapper">
    <div class="modal-medias">
        <div class="card">
            <h5 class="card-header d-flex justify-content-between align-items-center">
                Gestionnaire de médias
                <button type="button" class="btn-close" aria-label="Fermer" (click)="onClose()"></button>
            </h5>
            <div class="card-body" #mediasContainer>
                <div class="row g-3">
                    @for (media of medias; track media.id) {
                        <div class="col-6 col-md-4 col-lg-3">
                            <div class="card h-100">
                                <img [src]="getMediaUrl(media)" class="card-img-top" alt="{{ media.mediaDescription }}">
                                <div class="card-body d-flex flex-column">
                                    <button class="btn btn-danger mt-auto" (click)="onDeleteMedia(media)">Supprimer</button>
                                </div>
                            </div>
                        </div>
                    }
                </div>
            </div>
        </div>
    </div>

    <div class="modal-medias-overlay" (click)="onClose()"></div>
</div>
