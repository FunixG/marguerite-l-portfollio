<div class="card">
    <h5 class="card-header">Deux images</h5>
    <div class="card-body">
        <div class="row align-items-center text-center">
            <div class="col">
                <div>
                    @if (first) {
                        <app-media [media]="first"></app-media>
                    } @else {
                        <app-image-preview></app-image-preview>
                    }
                </div>

                <div>
                    <app-button
                            [label]="'+'"
                            [tooltip]="'Ajouter une image'"
                            [classBtn]="'btn-success mt-2'"
                            (onClick)="openSelection(true)"
                    ></app-button>
                </div>
            </div>

            <div class="col">
                <div>
                    @if (second) {
                        <app-media [media]="second"></app-media>
                    } @else {
                        <app-image-preview></app-image-preview>
                    }
                </div>

                <div>
                    <app-button
                            [label]="'+'"
                            [tooltip]="'Ajouter une image'"
                            [classBtn]="'btn-success mt-2'"
                            (onClick)="openSelection(false)"
                    ></app-button>
                </div>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col d-flex justify-content-end">
                <app-button
                        [label]="'-'"
                        [tooltip]="'Supprimer le module'"
                        [classBtn]="'btn-danger'"
                        (onClick)="removeModule()"
                ></app-button>
            </div>
        </div>
    </div>
</div>
