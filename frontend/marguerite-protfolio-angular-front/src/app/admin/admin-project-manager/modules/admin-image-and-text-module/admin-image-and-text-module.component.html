<div class="card">
    <h5 class="card-header">Image et texte</h5>
    <div class="card-body">
        <div class="row align-items-center text-center">
            <div class="col">
                <div>
                    @if (image) {
                        <app-media [media]="image"></app-media>
                    } @else {
                        <app-image-preview></app-image-preview>
                    }
                </div>

                <div>
                    <app-button
                            [label]="'+'"
                            [tooltip]="'Ajouter une image'"
                            [classBtn]="'btn-success mt-2'"
                            (onClick)="openImageSelection()"
                    ></app-button>
                </div>
            </div>

            <div class="col">
                <app-input-paragraph-text
                        [text]="text"
                        [placeholder]="'Texte à afficher à côté de l\'image...'"
                        (textChange)="setText($event)"
                ></app-input-paragraph-text>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col d-flex justify-content-end">
                <app-button
                        [label]="'-'"
                        [tooltip]="'Supprimer le module'"
                        [classBtn]="'btn-danger'"
                        (onClick)="removeModule()"
                ></app-button>
            </div>
        </div>
    </div>
</div>
