@if (loading) {
    <app-loader></app-loader>
} @else {
    <div class="actions-page-btn">
        <app-button
                [label]="'🎨'"
                [url]="'/admin/projects/new'"
                [classBtn]="'btn-success'"
                [tooltip]="'Ajouter un projet'"
        ></app-button>

        <app-button
                [label]="'🔑'"
                [url]="'/admin/password'"
                [classBtn]="'btn-secondary'"
                [tooltip]="'Changer le mot de passe'"
        ></app-button>
    </div>

    @if (projects.length == 0) {
        <div class="screen-center">
            <h1>Portfolio vide !</h1>
            <p>Il serait temps d'y remédier 🎨</p>

            <app-button
                    [label]="'Ajouter un projet'"
                    [url]="'/admin/projects/new'"
            ></app-button>
        </div>
    } @else {
        <div class="pt-5 pb-5 container-fluid d-flex flex-column gap-4">
            @for (project of projects; track project.id) {
                <app-admin-project-row [project]="project"></app-admin-project-row>
            }
        </div>
    }
}
